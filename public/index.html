<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicare - Digital Healthcare Companion</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .landing-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            position: relative;
            z-index: 1;
        }

        /* Transparent Header */
        .landing-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 2rem;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
        }

        .landing-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            text-decoration: none;
        }

        .landing-brand i {
            color: var(--accent-primary);
            font-size: 1.8rem;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem 2rem;
            text-align: center;
        }

        .hero-content {
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        .hero-tag {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 50px;
            color: var(--accent-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
        }

        .hero h1 span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn-large {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            border-radius: 50px;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border-glass);
            color: var(--text-primary);
            box-shadow: none;
        }

        .btn-outline:hover {
            border-color: var(--accent-primary);
            background: rgba(20, 184, 166, 0.1);
            transform: translateY(-2px);
        }

        /* Decorative Elements */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
        }

        .orb-1 {
            top: 20%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: rgba(20, 184, 166, 0.15);
        }

        .orb-2 {
            bottom: 10%;
            right: 15%;
            width: 500px;
            height: 500px;
            background: rgba(13, 148, 136, 0.15);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .hero-actions {
                flex-direction: column;
            }

            .hero-actions .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="landing-page">
        <!-- Floating Glows -->
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>

        <header class="landing-header">
            <a href="#" class="landing-brand">
                <i class="fas fa-heartbeat"></i> Medicare
            </a>
            <div class="header-actions">
                <a href="/login.html" class="btn btn-secondary" style="border-radius: 50px; padding: 0.5rem 1.5rem;">
                    Sign In
                </a>
            </div>
        </header>

        <main class="hero">
            <div class="hero-content">
                <div class="hero-tag">Welcome to the Future of Healthcare</div>
                <h1>Your Complete Digital<br><span>Healthcare Companion</span></h1>
                <p>
                    Experience seamless healthcare management. Track vitals, book specialist appointments, and access
                    AI-driven health insights—all from a single, secure dashboard.
                </p>
                <div class="hero-actions">
                    <a href="/login.html" class="btn btn-primary btn-large">
                        Get Started <i class="fas fa-arrow-right"></i>
                    </a>
                    <a href="/features.html" class="btn btn-outline btn-large">
                        Learn More
                    </a>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
