<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MEDICARE - Login to your account">
    <title>MEDICARE – Sign In</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="brand">
                <span class="brand-icon"><i class="fas fa-heartbeat"></i></span>
                <h1>MEDICARE</h1>
                <p>Welcome back! Please login to your account.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password"
                        required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/signup.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        const user = getUser();
        if (user) redirectByRole(user.role);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const body = {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                };

                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (!res.ok) {
                    showToast(data.error || 'Login failed', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                    return;
                }

                setToken(data.token);
                localStorage.setItem('medicare_user_name', data.name);
                showToast('Welcome back!', 'success');
                setTimeout(() => redirectByRole(data.role), 500);

            } catch (err) {
                showToast('Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
